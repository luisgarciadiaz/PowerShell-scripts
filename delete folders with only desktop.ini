
# Load the Windows Shell library for Recycle Bin support
Add-Type -AssemblyName Microsoft.VisualBasic
$root = "D:\" 

# 1. Gather all folders and sort by depth (Deepest First)
Write-Host "Analyzing folder structure..." -ForegroundColor Cyan
$allFolders = Get-ChildItem -LiteralPath $root -Recurse -Directory | 
              Sort-Object {$_.FullName.Length} -Descending

$toMoveToTrash = New-Object System.Collections.Generic.List[string]

# 2. Bottom-Up Analysis
foreach ($folder in $allFolders) {
    $path = $folder.FullName
    $items = Get-ChildItem -LiteralPath $path -Force -ErrorAction SilentlyContinue
    
    # Filter out desktop.ini
    $realFiles = $items | Where-Object { !$_.PSIsContainer -and $_.Name -ne "desktop.ini" }
    $subDirs = $items | Where-Object { $_.PSIsContainer }

    # Logic: No real files AND (No subdirs OR all subdirs are already in our trash list)
    if ($realFiles.Count -eq 0) {
        $remainingDirs = $subDirs | Where-Object { $toMoveToTrash -notcontains $_.FullName }
        if ($remainingDirs.Count -eq 0) {
            $toMoveToTrash.Add($path)
        }
    }
}

if ($toMoveToTrash.Count -eq 0) {
    Write-Host "No empty folders found." -ForegroundColor Green
    exit
}

# 3. Confirmation
Write-Host "`nFound $($toMoveToTrash.Count) folders to move to Trash." -ForegroundColor Yellow
$toMoveToTrash | Select-Object -First 3 | ForEach-Object { Write-Host " -> $_" -ForegroundColor Gray }

$confirm = Read-Host "`nType 'YES' to move these folders to the Recycle Bin"
if ($confirm -ne "YES") { Write-Host "Aborted."; exit }

# 4. Moving to Recycle Bin
$count = 0
foreach ($dir in $toMoveToTrash) {
    $count++
    $percent = ($count / $toMoveToTrash.Count) * 100
    Write-Progress -Activity "Recycling Folders" -Status "Sending to Trash: $dir" -PercentComplete $percent
    
    if (Test-Path -LiteralPath $dir) {
        # This is the "Magic" command that sends it to the actual Windows Recycle Bin
        [Microsoft.VisualBasic.FileIO.FileSystem]::DeleteDirectory($dir, 'OnlyErrorDialogs', 'SendToRecycleBin')
    }
}

Write-Progress -Activity "Recycling Folders" -Completed
Write-Host "Done! $count folders moved to the Recycle Bin." -ForegroundColor Green